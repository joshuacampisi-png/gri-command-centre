<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ads Testing | Gender Reveal Ideas & LionZen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { color-scheme: light; font-family: 'Inter', system-ui, sans-serif; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F8F9FC; color: #1a1a2e; min-height: 100vh; }
button, input, textarea, select { font: inherit; cursor: pointer; }

/* Layout */
.app-bar { background: #fff; border-bottom: 1px solid #E8ECF4; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.app-bar h1 { font-size: 18px; font-weight: 800; }
.app-bar-sub { font-size: 13px; color: #7C8DB0; margin-left: 12px; }
.app-bar-actions { display: flex; gap: 8px; align-items: center; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Buttons */
.btn { border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 500; transition: all .2s; }
.btn-primary { background: linear-gradient(135deg, #E43F7B, #d1356b); color: white; }
.btn-primary:hover { opacity: .88; }
.btn-sec { background: #fff; border: 1px solid #E8ECF4; color: #1a1a2e; border-radius: 10px; padding: 8px 14px; font-size: 13px; }
.btn-sec:hover { border-color: #E43F7B; color: #E43F7B; }
.btn-danger { background: rgba(239,68,68,0.08); color: #EF4444; border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 8px 14px; font-size: 13px; }
.btn-danger:hover { background: rgba(239,68,68,0.15); }
.select { background: #fff; color: #1a1a2e; border: 1px solid #E8ECF4; border-radius: 10px; padding: 8px 12px; font-size: 13px; }

/* Shared */
.brand-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-pill { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.muted { color: #7C8DB0; }

/* Stats bar */
.stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: #fff; border: 1px solid #E8ECF4; border-radius: 10px; padding: 14px 20px; display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #7C8DB0; }
.stat-value { font-size: 22px; font-weight: 800; }

/* List */
.list-filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border: 1px solid #E8ECF4; border-radius: 10px; overflow: hidden; }
th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #7C8DB0; padding: 10px 12px; text-align: left; background: #F8F9FC; border-bottom: 1px solid #E8ECF4; white-space: nowrap; }
td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid #E8ECF4; color: #1a1a2e; cursor: pointer; vertical-align: middle; }
tr:hover td { background: rgba(228,63,123,0.03); }
tr:last-child td { border-bottom: none; }
.row-sel td { background: rgba(228,63,123,0.06) !important; }
.hook-cell { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-thumb { width: 64px; height: 44px; object-fit: cover; border-radius: 6px; cursor: pointer; }
.dl-link { font-size: 16px; text-decoration: none; display: inline-block; padding: 2px 6px; border-radius: 4px; }
.dl-link:hover { background: rgba(228,63,123,0.1); }

/* Ad Status Toggle */
.ad-status-toggle { display: flex; gap: 4px; flex-wrap: wrap; }
.ad-status-btn { border: none; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; opacity: 0.35; transition: all .15s; }
.ad-status-btn:hover { opacity: 0.7; }
.ad-status-btn.active { opacity: 1; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.ad-scheduled { background: #E5E7EB; color: #4B5563; }
.ad-live { background: #D1FAE5; color: #059669; }
.ad-scaling { background: #EDE9FE; color: #7C3AED; }
.ad-paused { background: #FEE2E2; color: #DC2626; }

/* R6 Notes */
.r6-notes { width: 100%; min-height: 32px; max-height: 80px; border: 1px solid #E8ECF4; border-radius: 6px; padding: 6px 8px; font-size: 12px; resize: vertical; outline: none; font-family: inherit; }
.r6-notes:focus { border-color: #E43F7B; box-shadow: 0 0 0 3px rgba(228,63,123,0.1); }
.r6-notes::placeholder { color: #B0B8C9; }

/* Bulk bar */
.bulk-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #E8ECF4; border-radius: 12px; padding: 10px 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 100; }
.bulk-bar span { font-size: 13px; font-weight: 600; white-space: nowrap; }

/* Drawer overlay */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: flex; justify-content: flex-end; }
.drawer { width: 420px; max-width: 90vw; background: #fff; height: 100vh; display: flex; flex-direction: column; box-shadow: -8px 0 32px rgba(0,0,0,0.1); }
.drawer-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #E8ECF4; }
.drawer-head h3 { font-size: 16px; font-weight: 700; }
.close-btn { background: transparent; border: none; color: #7C8DB0; font-size: 18px; padding: 4px; }
.close-btn:hover { color: #1a1a2e; }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.drawer-foot { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-top: 1px solid #E8ECF4; }

.field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.field span { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #7C8DB0; }
.field input, .field textarea, .field select { background: #F8F9FC; color: #1a1a2e; border: 1px solid #E8ECF4; border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; resize: vertical; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: #E43F7B; box-shadow: 0 0 0 3px rgba(228,63,123,0.1); }
.field-row { display: flex; gap: 10px; }

/* Dropzone */
.dropzone { border: 2px dashed #E8ECF4; border-radius: 10px; padding: 14px; cursor: pointer; transition: border-color .15s; }
.dropzone:hover { border-color: #E43F7B; }
.drop-prompt { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #7C8DB0; font-size: 13px; padding: 12px; }
.drop-icon { font-size: 28px; }
.thumb-row { display: flex; align-items: center; gap: 10px; }
.thumb-img { width: 80px; height: 56px; object-fit: cover; border-radius: 6px; }
.thumb-meta { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.thumb-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.thumb-size { font-size: 11px; color: #7C8DB0; }
.play-btn { background: rgba(228,63,123,0.1); color: #E43F7B; border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; width: fit-content; text-decoration: none; display: inline-block; }
.play-btn:hover { background: rgba(228,63,123,0.2); }
.remove-vid { background: transparent; border: none; color: #7C8DB0; font-size: 14px; padding: 4px; }
.remove-vid:hover { color: #EF4444; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 14px; padding: 16px; max-width: 720px; width: 90vw; position: relative; }
.modal-close { position: absolute; top: 8px; right: 12px; background: transparent; border: none; color: #7C8DB0; font-size: 18px; }

.hidden { display: none; }
.dl-btn { display: inline-flex; align-items: center; background: rgba(228,63,123,0.1); color: #E43F7B; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; padding: 2px 6px; text-decoration: none; margin-left: 4px; }
.dl-btn:hover { background: rgba(228,63,123,0.2); }

@media (max-width: 768px) {
  .stats-bar { gap: 8px; }
  .stat-card { min-width: 100px; padding: 10px 14px; }
  .stat-value { font-size: 18px; }
  td, th { padding: 8px 8px; font-size: 12px; }
  .list-thumb { width: 48px; height: 32px; }
}
</style>
</head>
<body>
<div class="app-bar">
  <div style="display:flex;align-items:center">
    <h1>Ads Testing</h1>
    <span class="app-bar-sub">Gender Reveal Ideas & LionZen</span>
  </div>
  <div class="app-bar-actions">
    <button class="btn btn-primary" onclick="openNewEntry()">+ New Content</button>
  </div>
</div>
<div class="container">
  <!-- Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- List -->
  <div id="content-list"></div>
</div>

<!-- Drawer -->
<div id="drawer-overlay" class="drawer-overlay hidden" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head"><h3 id="drawer-title">New Content</h3><button class="close-btn" onclick="closeDrawer()">&#10005;</button></div>
    <div class="drawer-body">
      <div class="field-row">
        <label class="field"><span>Brand</span><select id="f-brand"><option>Gender Reveal Ideas</option><option>LionZen</option></select></label>
        <label class="field"><span>Platform</span><select id="f-platform"><option>Instagram Reels</option><option>TikTok</option><option>Facebook</option><option>YouTube Shorts</option></select></label>
      </div>
      <div class="field-row">
        <label class="field"><span>Date Added</span><input type="date" id="f-date"></label>
        <label class="field"><span>Time</span><input type="time" id="f-time"></label>
      </div>
      <div class="field-row">
        <label class="field"><span>Status</span><select id="f-status"><option>Draft</option><option>Scheduled</option><option>Live</option><option>Scaling</option><option>Published</option><option>Paused</option></select></label>
      </div>
      <label class="field"><span>Hook</span><input type="text" id="f-hook" placeholder="Attention-grabbing hook line"></label>
      <label class="field"><span>Caption</span><textarea rows="3" id="f-caption" placeholder="Post caption..."></textarea></label>
      <label class="field"><span>Call to Action</span><input type="text" id="f-cta" placeholder="e.g. Shop now, Link in bio"></label>
      <div class="dropzone" id="dropzone" ondragover="event.preventDefault()" ondrop="handleDrop(event)" onclick="document.getElementById('f-file').click()">
        <input type="file" id="f-file" accept=".mp4,.mov,.webm,.jpg,.jpeg,.png,.gif,.webp" hidden onchange="handleDrop(event)">
        <div id="drop-content">
          <div class="drop-prompt"><span class="drop-icon">&#127916;</span><span>Drop video or image here, or click to browse</span></div>
        </div>
      </div>
      <label class="field"><span>R6 Ad Notes</span><textarea rows="3" id="f-adnotes" placeholder="Ad performance notes... Was this ad successful or not? Key learnings..."></textarea></label>
      <label class="field"><span>Notes</span><textarea rows="2" id="f-notes" placeholder="Optional notes..."></textarea></label>
    </div>
    <div class="drawer-foot">
      <button class="btn-danger hidden" id="btn-delete" onclick="handleDelete()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn-sec" onclick="closeDrawer()">Cancel</button>
      <button class="btn btn-primary" onclick="handleSave()">Save</button>
    </div>
  </div>
</div>

<!-- Video/Image modal -->
<div id="video-modal" class="modal-overlay hidden" onclick="closeVideoModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeVideoModal()">&#10005;</button>
    <video id="modal-video" controls style="width:100%;max-height:70vh;border-radius:8px"></video>
    <img id="modal-image" style="width:100%;max-height:70vh;border-radius:8px;object-fit:contain;display:none" />
  </div>
</div>

<!-- Bulk bar -->
<div id="bulk-bar" class="bulk-bar hidden"></div>

<script>
const API = '/api/calendar'
const BRANDS = ['Gender Reveal Ideas', 'LionZen']
const PLATFORMS = ['Instagram Reels', 'TikTok', 'Facebook', 'YouTube Shorts']
const STATUSES = ['Draft', 'Scheduled', 'Live', 'Scaling', 'Published', 'Paused']
const AD_STATUS_COLORS = { Scheduled: '#9CA3AF', Live: '#059669', Scaling: '#7C3AED', Paused: '#DC2626' }
const AD_STATUS_CLASSES = { Scheduled: 'ad-scheduled', Live: 'ad-live', Scaling: 'ad-scaling', Paused: 'ad-paused' }
const STATUS_COLORS = { Draft: '#9CA3AF', Scheduled: '#3B82F6', Published: '#22C55E', Paused: '#F59E0B' }
const BRAND_COLORS = { 'Gender Reveal Ideas': '#EC4899', 'LionZen': '#14B8A6' }
const PLATFORM_ICONS = { 'Instagram Reels': '\uD83D\uDCF8', 'TikTok': '\uD83C\uDFB5', 'Facebook': '\uD83D\uDCD8', 'YouTube Shorts': '\u25B6\uFE0F' }

let entries = []
let editingEntry = null
let drawerVideoUrl = null
let drawerThumbnail = null
let drawerVideoName = ''
let drawerVideoSize = 0
let drawerMediaType = null
let selectedIds = new Set()
let uploadDoneTimer = null

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8) }
function fmtDate(d) { const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); return `${y}-${m}-${day}` }
function fmtSize(b) { return b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(1) + ' MB' }
function $(id) { return document.getElementById(id) }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

async function load() {
  const res = await fetch(API + '/entries')
  entries = await res.json()
  render()
}

function statusPill(s) {
  const c = STATUS_COLORS[s] || '#888'
  return `<span class="status-pill" style="background:${c}22;color:${c};border:1px solid ${c}44">${s}</span>`
}

function adStatusHTML(entry) {
  return `<div class="ad-status-toggle">${AD_STATUSES.map(s =>
    `<button class="ad-status-btn ${AD_STATUS_CLASSES[s]} ${entry.adStatus === s ? 'active' : ''}"
      onclick="event.stopPropagation();setAdStatus('${entry.id}','${s}')">${s}</button>`
  ).join('')}</div>`
}

async function setAdStatus(id, status) {
  const entry = entries.find(e => e.id === id)
  if (!entry) return
  entry.adStatus = entry.adStatus === status ? '' : status
  await fetch(API + '/entries', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry) })
  render()
}

async function saveAdNotes(id) {
  const el = document.querySelector(`[data-notes-id="${id}"]`)
  if (!el) return
  const entry = entries.find(e => e.id === id)
  if (!entry) return
  entry.adNotes = el.value
  await fetch(API + '/entries', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry) })
}

// Debounced auto-save for notes
let noteTimers = {}
function onNotesInput(id) {
  clearTimeout(noteTimers[id])
  noteTimers[id] = setTimeout(() => saveAdNotes(id), 1500)
}

function renderStats() {
  const total = entries.length
  const live = entries.filter(e => e.adStatus === 'Live').length
  const scaling = entries.filter(e => e.adStatus === 'Scaling').length
  const scheduled = entries.filter(e => e.adStatus === 'Scheduled').length
  const paused = entries.filter(e => e.adStatus === 'Paused').length

  $('stats-bar').innerHTML = `
    <div class="stat-card"><span class="stat-label">Total Content</span><span class="stat-value" style="color:#1a1a2e">${total}</span></div>
    <div class="stat-card"><span class="stat-label">Ads Live</span><span class="stat-value" style="color:#059669">${live}</span></div>
    <div class="stat-card"><span class="stat-label">Scaling</span><span class="stat-value" style="color:#7C3AED">${scaling}</span></div>
    <div class="stat-card"><span class="stat-label">Scheduled</span><span class="stat-value" style="color:#9CA3AF">${scheduled}</span></div>
    <div class="stat-card"><span class="stat-label">Paused</span><span class="stat-value" style="color:#DC2626">${paused}</span></div>
  `
}

function render() {
  renderStats()
  renderList()
}

function renderList() {
  const bf = $('list-brand-filter')?.value || ''
  const sf = $('list-status-filter')?.value || ''
  let filtered = [...entries]
  if (bf) filtered = filtered.filter(e => e.brand === bf)
  if (sf) filtered = filtered.filter(e => e.status === sf)
  filtered.sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time))

  let html = `<div class="list-filters">
    <select class="select" id="list-brand-filter" onchange="renderList()"><option value="">All Brands</option>${BRANDS.map(b => `<option ${bf===b?'selected':''}>${b}</option>`).join('')}</select>
    <select class="select" id="list-status-filter" onchange="renderList()"><option value="">All Statuses</option>${STATUSES.map(s => `<option ${sf===s?'selected':''}>${s}</option>`).join('')}</select>
  </div><div class="table-wrap"><table><thead><tr>
    <th style="width:40px"><input type="checkbox" onchange="toggleAll(this.checked)" ${selectedIds.size===filtered.length&&filtered.length?'checked':''}></th>
    <th>Date</th><th>Platform</th><th>Hook / Caption</th><th>Status</th><th>Preview</th><th style="min-width:180px">R6 Ad Notes</th><th></th>
  </tr></thead><tbody>`

  if (!filtered.length) html += '<tr><td colspan="10" class="muted" style="text-align:center;padding:24px">No content yet. Click + New Content to add your first piece.</td></tr>'

  filtered.forEach(e => {
    const bc = BRAND_COLORS[e.brand] || '#888'
    const hookText = e.hook || e.caption || '\u2014'
    html += `<tr class="${selectedIds.has(e.id)?'row-sel':''}" onclick="openEditEntry('${e.id}')">
      <td onclick="event.stopPropagation()"><input type="checkbox" ${selectedIds.has(e.id)?'checked':''} onchange="toggleSelect('${e.id}')"></td>
      <td style="white-space:nowrap">${e.date}</td>
      <td>${PLATFORM_ICONS[e.platform]||''} ${e.platform}</td>
      <td class="hook-cell">${esc(hookText)}</td>
      <td>${statusPill(e.status)}</td>
      <td onclick="event.stopPropagation()">${e.thumbnail ? `<img class="list-thumb" src="${e.thumbnail}" onclick="${e.videoUrl ? `openVideoModal('${e.videoUrl}')` : ''}">` : '\u2014'}${e.videoUrl ? ` <button class="play-btn" onclick="openVideoModal('${e.videoUrl}')" style="font-size:11px;padding:2px 6px">&#9654;</button>` : ''}</td>
      <td onclick="event.stopPropagation()"><textarea class="r6-notes" data-notes-id="${e.id}" placeholder="Ad notes..." oninput="onNotesInput('${e.id}')">${esc(e.adNotes || '')}</textarea></td>
      <td onclick="event.stopPropagation()">${e.videoUrl ? `<a class="dl-link" href="${e.videoUrl}" download title="Download">&#11015;</a>` : ''}</td>
    </tr>`
  })
  html += '</tbody></table></div>'
  $('content-list').innerHTML = html
  renderBulkBar()
}

function toggleAll(checked) {
  const bf = $('list-brand-filter')?.value || ''
  const sf = $('list-status-filter')?.value || ''
  let filtered = [...entries]
  if (bf) filtered = filtered.filter(e => e.brand === bf)
  if (sf) filtered = filtered.filter(e => e.status === sf)
  selectedIds = checked ? new Set(filtered.map(e => e.id)) : new Set()
  renderList()
}

function toggleSelect(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id)
  renderList()
}

function renderBulkBar() {
  const bar = $('bulk-bar')
  if (!selectedIds.size) { bar.classList.add('hidden'); return }
  bar.classList.remove('hidden')
  bar.innerHTML = `<span>${selectedIds.size} selected</span>
    ${AD_STATUSES.map(s => `<button class="btn-sec" onclick="bulkAdStatus('${s}')">Ad: ${s}</button>`).join('')}
    <button class="btn-danger" onclick="bulkDelete()">Delete</button>`
}

async function bulkAdStatus(status) {
  const ids = [...selectedIds]
  for (const id of ids) {
    const entry = entries.find(e => e.id === id)
    if (entry) {
      entry.adStatus = status
      await fetch(API + '/entries', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry) })
    }
  }
  selectedIds.clear()
  await load()
}

async function bulkDelete() {
  const ids = [...selectedIds]
  await fetch(API + '/entries/bulk-delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ids}) })
  selectedIds.clear()
  await load()
}

// Drawer
function openNewEntry(date) {
  editingEntry = null
  drawerVideoUrl = null; drawerThumbnail = null; drawerVideoName = ''; drawerVideoSize = 0; drawerMediaType = null
  $('drawer-title').textContent = 'New Content'
  $('f-brand').value = BRANDS[0]
  $('f-platform').value = PLATFORMS[0]
  $('f-date').value = date || fmtDate(new Date())
  $('f-time').value = '09:00'
  $('f-status').value = 'Draft'
  $('f-adstatus').value = ''
  $('f-hook').value = ''
  $('f-caption').value = ''
  $('f-cta').value = ''
  $('f-adnotes').value = ''
  $('f-notes').value = ''
  $('btn-delete').classList.add('hidden')
  renderAdStatusButtons()
  renderDropzone()
  $('drawer-overlay').classList.remove('hidden')
}

function openEditEntry(id) {
  const e = entries.find(en => en.id === id)
  if (!e) return
  editingEntry = e
  drawerVideoUrl = e.videoUrl || null
  drawerThumbnail = e.thumbnail || null
  drawerVideoName = e.videoName || ''
  drawerVideoSize = e.videoSize || 0
  drawerMediaType = e.mediaType || (e.videoUrl ? (e.videoUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i) ? 'image' : 'video') : null)
  $('drawer-title').textContent = 'Edit Content'
  $('f-brand').value = e.brand
  $('f-platform').value = e.platform
  $('f-date').value = e.date
  $('f-time').value = e.time
  $('f-status').value = e.status
  $('f-adstatus').value = e.adStatus || ''
  $('f-hook').value = e.hook || ''
  $('f-caption').value = e.caption || ''
  $('f-cta').value = e.cta || ''
  $('f-adnotes').value = e.adNotes || ''
  $('f-notes').value = e.notes || ''
  $('btn-delete').classList.remove('hidden')
  renderAdStatusButtons()
  renderDropzone()
  $('drawer-overlay').classList.remove('hidden')
}

function closeDrawer() { $('drawer-overlay').classList.add('hidden') }

function renderAdStatusButtons() {
  const current = $('f-adstatus').value
  $('ad-status-btns').innerHTML = AD_STATUSES.map(s =>
    `<button type="button" onclick="toggleAdStatus('${s}')" style="border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:${AD_STATUS_COLORS[s]}22;color:${AD_STATUS_COLORS[s]};opacity:${current===s?'1':'0.35'};box-shadow:${current===s?'0 2px 6px rgba(0,0,0,0.15)':'none'};transform:${current===s?'scale(1.05)':'scale(1)'}">${s}</button>`
  ).join('')
}

function toggleAdStatus(s) {
  $('f-adstatus').value = $('f-adstatus').value === s ? '' : s
  renderAdStatusButtons()
}

function renderDropzone() {
  if (drawerThumbnail) {
    const isVid = drawerMediaType === 'video'
    $('drop-content').innerHTML = `<div class="thumb-row">
      <img class="thumb-img" src="${drawerThumbnail}">
      <div class="thumb-meta">
        <span class="thumb-name">${esc(drawerVideoName)}</span>
        <span class="thumb-size">${fmtSize(drawerVideoSize)}</span>
        <span id="upload-done" style="display:none;color:#22C55E;font-size:11px;font-weight:700">Upload Complete</span>
        ${drawerVideoUrl ? `${isVid ? `<button class="play-btn" onclick="event.stopPropagation();openVideoModal('${drawerVideoUrl}')">&#9654; Preview</button>` : ''}
        <a class="play-btn" href="${drawerVideoUrl}" download onclick="event.stopPropagation()">&#11015; Download</a>` : ''}
      </div>
      <button class="remove-vid" onclick="event.stopPropagation();removeDrawerVideo()">&#10005;</button>
    </div>`
  } else {
    $('drop-content').innerHTML = '<div class="drop-prompt"><span class="drop-icon">&#127916;</span><span>Drop video or image here, or click to browse</span></div>'
  }
}

async function removeDrawerVideo() {
  if (drawerVideoUrl) await fetch(API + '/video/' + drawerVideoUrl.split('/').pop(), { method: 'DELETE' }).catch(() => {})
  drawerVideoUrl = null; drawerThumbnail = null; drawerVideoName = ''; drawerVideoSize = 0; drawerMediaType = null
  renderDropzone()
}

async function handleDrop(e) {
  e.preventDefault()
  const file = e.dataTransfer?.files?.[0] || e.target?.files?.[0]
  if (!file) return
  const ext = file.name.split('.').pop().toLowerCase()
  const isVideo = ['mp4','mov','webm'].includes(ext)
  const isImage = ['jpg','jpeg','png','gif','webp'].includes(ext)
  if (!isVideo && !isImage) return

  const thumb = isVideo ? await grabThumbnail(file) : await new Promise(resolve => {
    const reader = new FileReader()
    reader.onload = () => resolve(reader.result)
    reader.readAsDataURL(file)
  })
  drawerThumbnail = thumb
  drawerVideoName = file.name
  drawerVideoSize = file.size
  drawerMediaType = isVideo ? 'video' : 'image'
  renderDropzone()

  $('drop-content').innerHTML = '<div class="drop-prompt"><span class="drop-icon">&#9203;</span><span>Uploading...</span></div>'
  const form = new FormData()
  form.append('video', file)
  try {
    const res = await fetch(API + '/upload', { method: 'POST', body: form })
    const data = await res.json()
    drawerVideoUrl = data.url
    drawerVideoSize = data.size
    drawerMediaType = data.type || drawerMediaType
    renderDropzone()
    const doneEl = document.getElementById('upload-done')
    if (doneEl) { doneEl.style.display = 'inline'; clearTimeout(uploadDoneTimer); uploadDoneTimer = setTimeout(() => doneEl.style.display = 'none', 3000) }
  } catch { drawerThumbnail = null; drawerVideoName = ''; drawerVideoSize = 0; drawerMediaType = null; renderDropzone() }
}

function grabThumbnail(file) {
  return new Promise(resolve => {
    const video = document.createElement('video')
    video.preload = 'metadata'; video.muted = true; video.playsInline = true
    const url = URL.createObjectURL(file)
    video.src = url
    video.onloadeddata = () => { video.currentTime = 1 }
    video.onseeked = () => {
      const c = document.createElement('canvas')
      c.width = video.videoWidth; c.height = video.videoHeight
      c.getContext('2d').drawImage(video, 0, 0)
      resolve(c.toDataURL('image/jpeg', 0.7))
      URL.revokeObjectURL(url)
    }
    video.onerror = () => { resolve(null); URL.revokeObjectURL(url) }
  })
}

async function handleSave() {
  const entry = {
    id: editingEntry?.id || uid(),
    brand: $('f-brand').value,
    platform: $('f-platform').value,
    date: $('f-date').value,
    time: $('f-time').value,
    status: $('f-status').value,
    adStatus: $('f-adstatus').value,
    hook: $('f-hook').value,
    caption: $('f-caption').value,
    cta: $('f-cta').value,
    adNotes: $('f-adnotes').value,
    notes: $('f-notes').value,
    videoUrl: drawerVideoUrl,
    thumbnail: drawerThumbnail,
    videoName: drawerVideoName,
    videoSize: drawerVideoSize,
    mediaType: drawerMediaType
  }
  try {
    const res = await fetch(API + '/entries', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry) })
    if (!res.ok) throw new Error('Save failed')
    closeDrawer()
    await load()
  } catch (err) {
    alert('Failed to save entry. Please try again.')
  }
}

async function handleDelete() {
  if (!editingEntry) return
  await fetch(API + '/entries/' + editingEntry.id, { method: 'DELETE' })
  closeDrawer()
  await load()
}

function openVideoModal(url) {
  const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(url)
  if (isImg) {
    $('modal-video').style.display = 'none'
    $('modal-image').style.display = 'block'
    $('modal-image').src = url
  } else {
    $('modal-image').style.display = 'none'
    $('modal-video').style.display = 'block'
    $('modal-video').src = url
  }
  $('video-modal').classList.remove('hidden')
}

function closeVideoModal() {
  $('modal-video').pause()
  $('modal-video').src = ''
  $('modal-video').style.display = 'block'
  $('modal-image').src = ''
  $('modal-image').style.display = 'none'
  $('video-modal').classList.add('hidden')
}

// Auto-refresh every 30s
setInterval(load, 30000)
load()
</script>
</body>
</html>
